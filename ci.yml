name: CI Pipeline — Secure Ticketing

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ═══════════════════════════════════════════
  # STAGE 1: LINT (Code Quality)
  # ═══════════════════════════════════════════
  lint:
    name: 🔍 Lint & Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          # ══════════ Sesuaikan Database Masing-masing (pdo_mysql/pdo_pgsql) ══════════
          extensions: mbstring, xml, ctype, pdo_pgsql
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      # PHPStan (SAST) — sudah dipelajari Pekan 6
      - name: Run PHPStan (SAST)
        run: ./vendor/bin/phpstan analyse --error-format=github

  # ═══════════════════════════════════════════
  # STAGE 2: TESTS (Unit & Integration)
  # ═══════════════════════════════════════════
  test:
    name: 🧪 Tests & Coverage
    runs-on: ubuntu-latest
    needs: lint
    services:
    # ══════════ Sesuaikan Database Masing-masing ══════════
      # mysql:
      #   image: mysql:8.0
      #   env:
      #     MYSQL_ROOT_PASSWORD: password
      #     MYSQL_DATABASE: testing
      #   ports:
      #     - 3306:3306
      #   options: >-
      #     --health-cmd="mysqladmin ping"
      #     --health-interval=10s
      #     --health-timeout=5s
      #     --health-retries=3
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: db_testing
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          # ══════════ Sesuaikan Database Masing-masing (pdo_pgsql/pdo_mysql) ══════════
          extensions: mbstring, xml, ctype, pdo_pgsql, pgsql
          coverage: xdebug
      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('**/composer.lock') }}
      - name: Install dependencies
        run: composer install --prefer-dist --no-progress
      - name: Prepare Laravel
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan migrate --force
        env:
          # ══════════ Sesuaikan Database Masing-masing ══════════
          # DB_CONNECTION: mysql
          # DB_HOST: 127.0.0.1
          # DB_PORT: 3306
          # DB_DATABASE: testing
          # DB_USERNAME: root
          # DB_PASSWORD: password
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: db_testing
          DB_USERNAME: postgres
          DB_PASSWORD: password

      # ══════════════════════════════════════════════════════════════════════════════════════
      # Untuk Testing dengan Coverage perlu penyesuaian file test bawaan laravel
      # dengan struktur kode dan database proyek saat ini, Untuk saat ini untuk
      # pembelajaran cukup menjalankan test Security yang sudah kita buat sebelumnya
      # ══════════════════════════════════════════════════════════════════════════════════════
      # - name: Run tests with coverage
      #   run: php artisan test --coverage --min=70
      #   env:
          # ══════════ Sesuaikan Database Masing-masing ══════════
          # DB_CONNECTION: mysql
          # DB_HOST: 127.0.0.1
          # DB_PORT: 3306
          # DB_DATABASE: testing
          # DB_USERNAME: root
          # DB_PASSWORD: password
          # DB_CONNECTION: pgsql
          # DB_HOST: 127.0.0.1
          # DB_PORT: 5432
          # DB_DATABASE: db_testing
          # DB_USERNAME: postgres
          # DB_PASSWORD: password

  # ═══════════════════════════════════════════
  # STAGE 3: SECURITY CHECKS (SCA + Sec Tests)
  # ═══════════════════════════════════════════
  security:
    name: 🛡️ Security Checks
    runs-on: ubuntu-latest
    needs: test
    services:
      # ══════════ Sesuaikan Database Masing-masing ══════════
      # mysql:
      #   image: mysql:8.0
      #   env:
      #     MYSQL_ROOT_PASSWORD: password
      #     MYSQL_DATABASE: testing
      #   ports:
      #     - 3306:3306
      #   options: >-
      #     --health-cmd="mysqladmin ping"
      #     --health-interval=10s
      #     --health-timeout=5s
      #     --health-retries=3
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: db_testing
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress
      # SCA — sudah dipelajari Pekan 6
      - name: Composer audit (SCA)
        run: composer audit
      # Security Unit Tests — sudah dibuat Pekan 6
      - name: Prepare Database for Security Tests
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan migrate --force
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: db_testing
          DB_USERNAME: postgres
          DB_PASSWORD: password
      - name: Run Security Test Suite
        run: php artisan test tests/Feature/Security/
        env:
          # ══════════ Sesuaikan Database Masing-masing ══════════
          # DB_CONNECTION: mysql
          # DB_HOST: 127.0.0.1
          # DB_PORT: 3306
          # DB_DATABASE: testing
          # DB_USERNAME: root
          # DB_PASSWORD: password
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: db_testing
          DB_USERNAME: postgres
          DB_PASSWORD: password
